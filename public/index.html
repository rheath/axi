<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axi AI Readiness Checker</title>
    <style>
      :root {
        --bg: #f7f8ef;
        --ink: #11281f;
        --muted: #556a61;
        --primary: #175b44;
        --accent: #cde589;
        --card: #ffffff;
        --warn: #b06a00;
        --bad: #b12c2c;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 90% 0%, #e4f6b8 0%, transparent 42%),
          radial-gradient(circle at 0% 100%, #bde9d7 0%, transparent 36%),
          var(--bg);
      }

      .shell {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3.2rem);
        margin: 0 0 12px;
        line-height: 1.08;
      }

      p.lead {
        color: var(--muted);
        margin: 0 0 24px;
        max-width: 720px;
      }

      .input-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      input[type="url"], input[type="email"] {
        border: 1px solid #d0d9d5;
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 16px;
        min-width: 260px;
        flex: 1;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 14px 18px;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: var(--primary);
        cursor: pointer;
      }

      button.secondary {
        background: #2f7f63;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .card {
        margin-top: 28px;
        background: var(--card);
        border: 1px solid #d6e0db;
        border-radius: 16px;
        padding: 22px;
        box-shadow: 0 10px 40px rgba(17, 40, 31, 0.07);
      }

      .status { color: var(--muted); }

      .score {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .score-pill {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: linear-gradient(145deg, #163f30, #2d7b5d);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 30px;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .cat {
        border: 1px solid #e1e8e4;
        border-radius: 12px;
        padding: 12px;
      }

      .fix {
        border: 1px solid #e1e8e4;
        border-radius: 12px;
        padding: 12px;
        margin: 10px 0;
      }

      .badge {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        background: #edf4ef;
      }

      .badge.warn { color: var(--warn); }
      .badge.fail { color: var(--bad); }

      .hidden { display: none; }
      .small { color: var(--muted); font-size: 14px; }

      @media (max-width: 640px) {
        .score { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>AI Readiness Checker</h1>
      <p class="lead">
        Drop in any website URL to generate an AI-readiness score based on crawlability,
        structure, trust signals, and content extractability.
      </p>

      <section class="card">
        <div class="input-row">
          <input id="urlInput" type="url" placeholder="example.com" />
          <button id="scanButton">Run Scan</button>
        </div>
        <p id="status" class="status">Ready.</p>
      </section>

      <section id="reportSection" class="card hidden">
        <div class="score">
          <div class="score-pill" id="overallScore">0</div>
          <div>
            <h2 id="reportUrl" style="margin: 0 0 6px"></h2>
            <p class="small" id="createdAt"></p>
          </div>
        </div>

        <h3>Category Scores</h3>
        <div id="categories" class="grid"></div>

        <h3>Top Fixes</h3>
        <div id="fixes"></div>

        <div id="unlockSection" class="card" style="margin-top: 16px; background: #fcfff7">
          <h3 style="margin-top: 0">Unlock full report</h3>
          <p class="small">Enter your email to reveal all findings and recommendations.</p>
          <div class="input-row">
            <input id="emailInput" type="email" placeholder="you@company.com" />
            <button id="unlockButton" class="secondary">Unlock</button>
          </div>
          <label class="small" style="display: block; margin-top: 8px;">
            <input id="consentInput" type="checkbox" /> I agree to receive occasional product updates.
          </label>
        </div>
      </section>
    </main>

    <script>
      const urlInput = document.getElementById("urlInput");
      const scanButton = document.getElementById("scanButton");
      const statusEl = document.getElementById("status");
      const reportSection = document.getElementById("reportSection");
      const overallScore = document.getElementById("overallScore");
      const reportUrl = document.getElementById("reportUrl");
      const createdAt = document.getElementById("createdAt");
      const categories = document.getElementById("categories");
      const fixes = document.getElementById("fixes");
      const unlockSection = document.getElementById("unlockSection");
      const emailInput = document.getElementById("emailInput");
      const unlockButton = document.getElementById("unlockButton");
      const consentInput = document.getElementById("consentInput");

      let currentReportId = null;

      function fixCard(check) {
        const cls = check.outcome === "fail" ? "fail" : check.outcome === "warn" ? "warn" : "";
        return `
          <article class="fix">
            <div style="display:flex; justify-content:space-between; gap:8px;">
              <strong>${check.title}</strong>
              <span class="badge ${cls}">${check.outcome.toUpperCase()}</span>
            </div>
            <p class="small">${check.description}</p>
            <p class="small"><strong>Evidence:</strong> ${check.evidence || "n/a"}</p>
            <p class="small"><strong>Fix:</strong> ${check.recommendation || "n/a"}</p>
          </article>
        `;
      }

      function categoryCard(cat) {
        return `
          <article class="cat">
            <strong>${cat.label}</strong>
            <p style="font-size: 26px; margin: 10px 0 0;">${cat.score}</p>
            <p class="small" style="margin: 2px 0 0;">Weight ${cat.weight}%</p>
          </article>
        `;
      }

      function renderReport(report) {
        reportSection.classList.remove("hidden");
        overallScore.textContent = String(report.overallScore);
        reportUrl.textContent = report.normalizedUrl;
        createdAt.textContent = `Generated ${new Date(report.createdAt).toLocaleString()}`;

        categories.innerHTML = report.categoryScores.map(categoryCard).join("");
        fixes.innerHTML = report.topFixes.map(fixCard).join("");

        if (report.lockStatus === "locked") {
          unlockSection.classList.remove("hidden");
          statusEl.textContent = "Preview generated. Unlock full findings with email.";
        } else {
          unlockSection.classList.add("hidden");
          statusEl.textContent = "Full report unlocked.";
        }
      }

      async function runScan() {
        const url = urlInput.value.trim();
        if (!url) {
          statusEl.textContent = "Please enter a URL.";
          return;
        }

        scanButton.disabled = true;
        statusEl.textContent = "Scanning website...";

        try {
          const response = await fetch("/api/scans", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ url })
          });

          const json = await response.json();
          if (!response.ok) {
            throw new Error(json.error || "Scan failed");
          }

          currentReportId = json.reportId;
          renderReport(json.report);
        } catch (error) {
          statusEl.textContent = `Scan failed: ${error.message}`;
        } finally {
          scanButton.disabled = false;
        }
      }

      async function unlockReport() {
        if (!currentReportId) {
          statusEl.textContent = "Run a scan first.";
          return;
        }

        const email = emailInput.value.trim();
        if (!email) {
          statusEl.textContent = "Enter an email to unlock.";
          return;
        }

        unlockButton.disabled = true;
        statusEl.textContent = "Unlocking report...";

        try {
          const response = await fetch(`/api/reports/${currentReportId}/lead`, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ email, consent: consentInput.checked })
          });

          const json = await response.json();
          if (!response.ok) {
            throw new Error(json.error || "Unable to unlock report");
          }

          const full = await fetch(`/api/reports/${currentReportId}`);
          const fullJson = await full.json();
          if (!full.ok) {
            throw new Error(fullJson.error || "Unable to fetch full report");
          }
          renderReport(fullJson);
        } catch (error) {
          statusEl.textContent = `Unlock failed: ${error.message}`;
        } finally {
          unlockButton.disabled = false;
        }
      }

      scanButton.addEventListener("click", runScan);
      unlockButton.addEventListener("click", unlockReport);
    </script>
  </body>
</html>
